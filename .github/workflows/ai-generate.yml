name: AI Generate & Commit Project

on:
  workflow_dispatch:
    inputs:
      project_description:
        description: 'Describe the website/app/code to generate'
        required: true
      language:
        description: 'Primary language / stack (e.g. javascript, python, node-react)'
        required: false
        default: 'javascript'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Ensure scripts directory exists
        run: mkdir -p .github/scripts

      - name: Run AI generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROJECT_DESCRIPTION: ${{ github.event.inputs.project_description }}
          LANGUAGE: ${{ github.event.inputs.language }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          python .github/scripts/generate.py

      - name: Commit & push generated files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_DESCRIPTION: ${{ github.event.inputs.project_description }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "AI-generated: ${PROJECT_DESCRIPTION}"
            git push
          else
            echo "No changes to commit."
          fi

